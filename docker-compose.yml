services:
  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: python manage.py runserver 0.0.0.0:8000
    # For production usage, replace the command above with gunicorn:
    # command: gunicorn --bind 0.0.0.0:8000 E_Learning.wsgi:application

volumes:
  sqlite_data:
